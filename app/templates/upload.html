<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCS | Upload</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="page-header">
        <div class="brand">
            <span class="brand-mark">SCS</span>
            <div>
                <h1>File Encryption</h1>
                <p>Upload files securely to the cloud with local encryption.</p>
            </div>
        </div>
        <nav class="main-nav">
            <a href="/">HOME</a>
            <a href="/upload">UPLOAD</a>
            <a href="/search">SEARCH</a>
        </nav>
    </header>

    <main class="page-content">
        <section class="upload-panel">
            <div class="complete-upload-div">
                <div class="upload-card">
                    <h2>Encrypt & Upload</h2>
                    <p>Choose a file from your device and push it to secure cloud storage after local encryption.</p>

                    <label for="fileInput" class="file-picker">
                        <span>Select a file</span>
                        <input type="file" id="fileInput">
                    </label>

                    <div class="progress-container">
                        <div id="pCircle" class="progress-circle" data-progress="0"></div>
                    </div>

                    <button class="primary-btn" onclick="uploadFile()">Encrypt & Upload to S3</button>
                    <p id="status" class="status-text"></p>
                </div>
            </div>

            <div class="terminal-window">
                <div class="terminal-header">
                    <span>LIVE CONSOLE</span>
                    <span>● ● ●</span>
                </div>
                <div id="terminalBody" class="terminal-body">
                    <div class="log-entry">Waiting for process...</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');
            if (!fileInput.files[0]) {
                status.innerText = 'Please select a file to upload.';
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/upload', true);

            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    const circle = document.getElementById('pCircle');
                    circle.style.background = `conic-gradient(var(--neon-blue) ${percent}%, #222 ${percent}%)`;
                    circle.setAttribute('data-progress', percent);
                }
            };

            xhr.onload = function() {
                const res = JSON.parse(xhr.responseText);
                status.innerText = res.message || res.error;
            };

            xhr.send(formData);
        }

        const terminalBody = document.getElementById('terminalBody');
        const eventSource = new EventSource('/stream-logs');
        eventSource.onmessage = function(event) {
            const newLog = document.createElement('div');
            newLog.className = 'log-entry';
            newLog.innerText = `> ${event.data}`;
            terminalBody.appendChild(newLog);
            terminalBody.scrollTop = terminalBody.scrollHeight;
        };
    </script>
</body>
</html>
